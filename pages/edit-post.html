<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Edit Post - BIBlog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
</head>
<body>
    <div class="topbar">
        <div class="wrapper target">
            <div class="left">
                <button class="hamburger-btn" id="hamburgerBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </div>
            <div class="center">
                <a href="../index.html">BIBlog</a>
            </div>
            <div class="right">
                <button class="dark-mode-btn" id="darkModeBtn" title="Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <img id="menuProfileImg" src="../public/img/user/user-1.jpg" alt="profil">
            <div>
                <p id="menuUserName">Guest</p>
                <span id="menuUserEmail"></span>
            </div>
        </div>
        <nav>
            <a href="../index.html"><i class="fa-solid fa-house"></i> <span>Home</span></a>
            <a href="profile.html" id="menuProfileLink" style="display:none;"><i class="fa-solid fa-user"></i> <span>My Profile</span></a>
            <a href="explore.html"><i class="fa-solid fa-compass"></i> <span>Explore</span></a>
            <a href="public.html"><i class="fa-solid fa-globe"></i> <span>Public Blogs</span></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> <span>Settings</span></a>
            <a href="#" id="menuLogoutBtn" onclick="logout()" style="display:none; color:#ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i> <span>Log Out</span></a>
        </nav>
        <div class="side-menu-footer"><small>BIBlog © 2025</small></div>
    </div>
    <div class="side-overlay" id="sideOverlay"></div>

    <div class="add">
        <div style="text-align:center; padding: 20px;">
            <h2 style="font-family:'Josefin Sans',sans-serif;"><i class="fa-solid fa-pen"></i> Edit Post</h2>
            <p id="loadingText" style="color:#888;">Loading post...</p>
        </div>
        <form id="editPostForm" style="display:none;">
            <div class="add-form-top">
                <input type="text" id="postTitle" placeholder="Title *" required>
                <textarea id="postContent" placeholder="Content *" required></textarea>
            </div>
            <div class="add-form-bottom">
                <div class="media-upload-area" id="mediaUploadArea">
                    <p style="font-weight:600; margin-bottom:10px; font-family:'Josefin Sans',sans-serif;">Current Media</p>
                    <div class="media-preview-container" id="existingMediaContainer"></div>
                    
                    <div class="media-drop-zone" id="dropZone" style="margin-top:15px;">
                        <i class="fa-solid fa-plus" style="font-size:2rem;margin-bottom:10px;display:block;color:#888;"></i>
                        <p style="color:#888;margin:0;font-family:'Josefin Sans',sans-serif;">Add more photos/videos</p>
                        <small style="color:#aaa;font-family:'Josefin Sans',sans-serif;font-size:0.8rem;">Max 5 total</small>
                    </div>
                    <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*" multiple>
                    <div class="media-preview-container" id="newMediaPreviewContainer" style="display:none;"></div>
                </div>
                
                <button type="submit" id="submitBtn">
                    <i class="fa-solid fa-floppy-disk"></i> Save Changes
                </button>
                <button type="button" id="cancelBtn" onclick="window.location.href='profile.html'" style="background:#666; margin-left:10px;">
                    <i class="fa-solid fa-xmark"></i> Cancel
                </button>
            </div>
        </form>
    </div>

    <style>
    .media-upload-area {
        width: 100%;
        margin-bottom: 16px;
    }
    .media-drop-zone {
        border: 2px dashed #ddd;
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #fafafa;
    }
    .media-drop-zone:hover, .media-drop-zone.dragover {
        border-color: #4f46e5;
        background: #f0f0ff;
    }
    .media-preview-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
    }
    .media-preview-item {
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid #eee;
    }
    .media-preview-item img, .media-preview-item video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .media-preview-item .remove-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        background: rgba(0,0,0,0.7);
        color: #fff;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .media-preview-item .media-type-badge {
        position: absolute;
        bottom: 4px;
        left: 4px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
    }
    #cancelBtn {
        padding: 12px 24px;
        background: #666;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-family: 'Josefin Sans', sans-serif;
        font-size: 1rem;
        transition: background 0.2s;
    }
    #cancelBtn:hover {
        background: #444;
    }
    </style>

    <script src="../public/js/dark-mode.js"></script>
    <script src="../public/js/search.js"></script>
    <script src="../public/js/scroll.js"></script>
    <script src="../public/js/menu.js"></script>
    <script type="module" src="../public/js/firebase.js"></script>
    <script type="module" src="../public/js/edit-post.js"></script>
    <script type="module" src="../public/js/auth-kontrol.js"></script>
    <script src="../public/js/cookie-consent.js"></script>
    <script src="../public/js/terms-consent.js"></script>
</body>
</html>
