<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
    <title>Admin Panel - BIBlog</title>
    <style>
        .admin-page { max-width: 960px; margin: 30px auto; padding: 0 15px 80px; }
        .admin-title { font-family: 'Josefin Sans', sans-serif; font-size: 1.5rem; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: #f59e0b; flex-wrap: wrap; }
        .admin-title button { margin-left: auto; padding: 8px 18px; background: #f59e0b; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: 'Josefin Sans', sans-serif; font-size: 0.85rem; }
        .admin-section { background: #fff; border-radius: 15px; border: 1px solid #eee; margin-bottom: 25px; overflow: visible; }
        .admin-section-title { font-family: 'Josefin Sans', sans-serif; font-size: 0.85rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 10px; }
        .admin-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #f5f5f5; flex-wrap: wrap; gap: 10px; }
        .admin-row:last-child { border-bottom: none; }
        .admin-row-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .admin-row-info img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid #eee; flex-shrink: 0; }
        .admin-row-info strong { display: block; font-family: 'Josefin Sans', sans-serif; font-size: 0.95rem; }
        .admin-row-info span { font-size: 0.8rem; color: #888; display: block; }
        .admin-row-actions { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
        .ban-btn { padding: 6px 12px; background: #ff4d4d; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: 'Josefin Sans', sans-serif; }
        .unban-btn { padding: 6px 12px; background: #2ecc71; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: 'Josefin Sans', sans-serif; }
        .role-btn { padding: 6px 12px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: 'Josefin Sans', sans-serif; }
        .delete-btn-admin { padding: 6px 12px; background: #111; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.8rem; font-family: 'Josefin Sans', sans-serif; }
        .role-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; background: #f0f0f0; color: #555; margin-left: 4px; }
        .role-badge.admin { background: #fef3c7; color: #d97706; }
        .banned-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.72rem; background: #fee2e2; color: #dc2626; margin-left: 4px; }
        /* Stats */
        #adminStats { display: flex; flex-wrap: wrap; gap: 15px; padding: 20px; }
        .stat-card { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 16px 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; min-width: 100px; flex: 1; }
        .stat-card i { font-size: 1.4rem; color: #4f46e5; margin-bottom: 4px; }
        .stat-card strong { font-family: 'Josefin Sans', sans-serif; font-size: 1.5rem; }
        .stat-card span { font-size: 0.78rem; color: #888; font-family: 'Josefin Sans', sans-serif; }
        /* Search */
        .admin-search { padding: 10px 20px; border-bottom: 1px solid #f0f0f0; }
        .admin-search input { width: 100%; padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Josefin Sans', sans-serif; font-size: 0.9rem; box-sizing: border-box; }
        /* Dark mode */
        body.dark-mode .admin-section { background: #16213e; border-color: #2a2a4a; }
        body.dark-mode .admin-row { border-color: #2a2a4a; }
        body.dark-mode .admin-row-info strong { color: #e0e0e0; }
        body.dark-mode .admin-section-title { border-color: #2a2a4a; color: #888; }
        body.dark-mode .stat-card { background: #0f3460; border-color: #2a2a4a; }
        body.dark-mode .stat-card span { color: #aaa; }
        body.dark-mode .admin-search input { background: #1a1a2e; border-color: #2a2a4a; color: #e0e0e0; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="wrapper target">
            <div class="left">
                <button class="hamburger-btn" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div class="center" style="color:#f59e0b;font-weight:bold;letter-spacing:2px;">
                <i class="fa-solid fa-shield-halved"></i> ADMIN PANEL
            </div>
            <div class="right">
                <button class="dark-mode-btn" id="darkModeBtn"><i class="fa-solid fa-moon"></i></button>
            </div>
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <img id="menuProfileImg" src="../public/img/user/user-1.jpg" alt="profile">
            <div><p id="menuUserName">Admin</p><span id="menuUserEmail"></span></div>
        </div>
        <nav>
            <a href="../index.html"><i class="fa-solid fa-house"></i> <span data-i18n="menuHome">Home</span></a>
            <a href="profile.html" id="menuProfileLink"><i class="fa-solid fa-user"></i> <span data-i18n="menuProfile">My Profile</span></a>
            <a href="notifications.html"><i class="fa-solid fa-bell"></i> <span data-i18n="menuNotif">Notifications</span></a>
            <a href="messages.html"><i class="fa-solid fa-comments"></i> <span data-i18n="menuMessages">Messages</span></a>
            <a href="public.html"><i class="fa-solid fa-globe"></i> <span data-i18n="menuPublic">Public Blogs</span></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> <span data-i18n="menuSettings">Settings</span></a>
            <a href="admin.html" id="adminLink" style="color:#f59e0b;"><i class="fa-solid fa-shield-halved"></i> Admin Panel</a>
            <a href="#" id="menuLogoutBtn" onclick="logout()" style="display:none;color:#ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="menuLogout">Log Out</span></a>
        </nav>
        <div class="side-menu-footer"><small data-i18n="copyright">BIBlog © 2025</small></div>
    </div>
    <div class="side-overlay" id="sideOverlay"></div>

    <div class="admin-page">
        <h2 class="admin-title">
            <i class="fa-solid fa-shield-halved"></i> Admin Panel
            <button onclick="refreshAll()"><i class="fa-solid fa-rotate"></i> Refresh All</button>
        </h2>

        <!-- Stats -->
        <div class="admin-section">
            <div class="admin-section-title"><i class="fa-solid fa-chart-bar"></i> Overview</div>
            <div id="adminStats"><p style="padding:20px;color:#888;">Loading stats...</p></div>
        </div>

        <!-- Users -->
        <div class="admin-section">
            <div class="admin-section-title"><i class="fa-solid fa-users"></i> Users</div>
            <div id="userList"><p style="padding:20px;text-align:center;">Loading...</p></div>
        </div>

        <!-- Posts -->
        <div class="admin-section">
            <div class="admin-section-title"><i class="fa-solid fa-file-lines"></i> All Posts</div>
            <div class="admin-search"><input type="text" id="postSearch" placeholder="Search posts by title or author..."></div>
            <div id="postList"><p style="padding:20px;text-align:center;">Loading...</p></div>
        </div>

        <!-- Follow Requests -->
        <div class="admin-section">
            <div class="admin-section-title"><i class="fa-solid fa-user-clock"></i> Pending Follow Requests</div>
            <div id="followRequestList"><p style="padding:20px;text-align:center;">Loading...</p></div>
        </div>
    </div>

    <script src="../public/js/dark-mode.js"></script>
    <script src="../public/js/scroll.js"></script>
    <script src="../public/js/menu.js"></script>
    <script src="../public/js/language.js"></script>
    <script type="module" src="../public/js/firebase.js"></script>
    <script type="module" src="../public/js/auth-kontrol.js"></script>
    <script type="module" src="../public/js/admin.js"></script>

    <script src="../public/js/cookie-consent.js"></script>
    <script src="../public/js/terms-consent.js"></script>
</body>
</html>
