<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="../public/css/index.css">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Forgot Password - BIBlog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
</head>
<body>
   <div class="topbar">
      <div class="wrapper target">
         <div class="left">
            <i class="fa-brands fa-square-x-twitter"></i>
            <i class="fa-brands fa-square-instagram"></i>
            <i class="fa-brands fa-square-facebook"></i>
         </div>
         <div class="center">
            <a href="../index.html">HOME</a>
            <a href="./about.html">ABOUT</a>
            <a href="./register.html">REGISTER</a>
            <a href="./login.html">LOGIN</a>
         </div>
         <div class="right">
            <div class="searchEngine" id="searchEngine">
               <input type="text" id="searchInput" placeholder="Search...">
               <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
            </div>
         </div>
      </div>
   </div>

   <div class="logReg">
      <img src="../public/img/background/login.png" alt="background">
      <form id="forgotForm">
         <div class="formGroup">
            <input type="email" id="forgotEmail" required>
            <span>Your Email Address *</span>
         </div>
         <div style="color:#aaa; font-size:0.82rem; font-family:'Josefin Sans',sans-serif; margin-bottom:15px; padding: 0 5px;">
            We will send a password reset link to your registered email.
         </div>
         <div class="btnGroup">
            <a href="./login.html">Back to Login</a>
            <button type="submit" id="sendBtn">Send</button>
         </div>
      </form>
   </div>

   <script src="../public/js/search.js"></script>
   <script src="../public/js/scroll.js"></script>
   <script type="module" src="../public/js/firebase.js"></script>
   <script type="module" src="../public/js/forgot-password.js"></script>
     <script src="../public/js/language.js"></script>
     <script src="../public/js/cookie-consent.js"></script>
     <script src="../public/js/terms-consent.js"></script>
</body>
</html>
