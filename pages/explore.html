<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Explore - BIBlog</title>
    <!-- Google AdSense -->
</head>
<body>
    <div class="topbar">
        <div class="wrapper target">
            <div class="left">
                <button class="hamburger-btn" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></button>
            </div>
            <div class="center"><a href="../index.html">BIBlog</a></div>
            <div class="right">
                <button class="dark-mode-btn" id="darkModeBtn"><i class="fa-solid fa-moon"></i></button>
                <div class="searchEngine" id="searchEngine">
                    <input type="text" id="searchInput" data-i18n-placeholder="searchPeople" placeholder="Search people...">
                    <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <img id="menuProfileImg" src="../public/img/user/user-1.jpg" alt="profile">
            <div><p id="menuUserName">Guest</p><span id="menuUserEmail"></span></div>
        </div>
        <nav>
            <a href="../index.html"><i class="fa-solid fa-house"></i> <span data-i18n="menuHome">Home</span></a>
            <a href="profile.html" id="menuProfileLink" style="display:none;"><i class="fa-solid fa-user"></i> <span data-i18n="menuProfile">My Profile</span></a>
            <a href="explore.html"><i class="fa-solid fa-compass"></i> <span data-i18n="menuExplore">Explore</span></a>
            <a href="messages.html"><i class="fa-solid fa-comments"></i> <span data-i18n="menuMessages">Messages</span></a>
            <a href="notifications.html"><i class="fa-solid fa-bell"></i> <span data-i18n="menuNotif">Notifications</span></a>
            <a href="public.html"><i class="fa-solid fa-globe"></i> <span data-i18n="menuPublic">Public Blogs</span></a>
            <a href="about.html"><i class="fa-solid fa-circle-info"></i> <span data-i18n="menuAbout">About</span></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> <span data-i18n="menuSettings">Settings</span></a>
            <a href="admin.html" id="adminLink" style="display:none; color:#f59e0b;"><i class="fa-solid fa-shield-halved"></i> Admin Panel</a>
            <a href="#" id="menuLogoutBtn" onclick="logout()" style="display:none; color:#ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="signOut">Log Out</span></a>
        </nav>
        <div class="side-menu-footer"><small data-i18n="copyright">BIBlog © 2025</small></div>
    </div>
    <div class="side-overlay" id="sideOverlay"></div>

    <div style="max-width:800px;margin:30px auto;padding:0 15px 80px;">
        <h2 style="font-family:'Josefin Sans',sans-serif;font-size:1.4rem;display:flex;align-items:center;gap:10px;margin-bottom:20px;">
            <i class="fa-solid fa-compass"></i> <span data-i18n="menuExplore">Explore</span>
        </h2>

        <!-- Arama -->
        <div style="position:relative;margin-bottom:24px;">
            <input type="text" id="peopleSearch" placeholder="Search by name..."
                style="width:100%;padding:12px 16px 12px 44px;border:1px solid #ddd;border-radius:12px;outline:none;font-family:'Josefin Sans',sans-serif;font-size:0.95rem;background:#fff;">
            <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#aaa;"></i>
        </div>

        <!-- Kullanıcı listesi -->
        <div id="userListContainer">
            <p style="text-align:center;padding:40px;color:#888;font-family:'Josefin Sans',sans-serif;">
                <i class="fa-solid fa-spinner fa-spin" style="font-size:1.5rem;display:block;margin-bottom:12px;"></i>
                <span data-i18n="loadingPeople">Loading people...</span>
            </p>
        </div>

        <!-- CTA -->
        <div id="exploreCTA" style="width:100%;background:linear-gradient(135deg,#1a1a2e,#16213e);border-radius:16px;padding:32px 24px;text-align:center;margin-top:24px;color:#fff;">
            <i class="fa-solid fa-pen-nib" style="font-size:2.5rem;margin-bottom:16px;display:block;opacity:0.8;"></i>
            <h3 style="font-family:'Pacifico',cursive;font-size:1.4rem;margin-bottom:10px;" data-i18n="addOneYourself">Add one for yourself</h3>
            <p style="font-family:'Josefin Sans',sans-serif;font-size:0.9rem;opacity:0.8;margin-bottom:20px;line-height:1.6;" data-i18n="inspireOthers">Inspire others — write your own blog post and share your perspective with the world.</p>
            <a href="add.html" style="display:inline-block;padding:12px 28px;background:#4f46e5;color:#fff;border-radius:10px;font-family:'Josefin Sans',sans-serif;font-size:0.9rem;text-decoration:none;transition:background 0.2s;"
               onmouseover="this.style.background='#4338ca'" onmouseout="this.style.background='#4f46e5'">
                <i class="fa-solid fa-plus"></i> <span data-i18n="ctaBtn">Write a Post</span>
            </a>
        </div>
    </div>

    <script src="../public/js/dark-mode.js"></script>
    <script src="../public/js/scroll.js"></script>
    <script src="../public/js/menu.js"></script>
    <script src="../public/js/language.js"></script>
    <script type="module" src="../public/js/firebase.js"></script>
    <script type="module" src="../public/js/auth-kontrol.js"></script>
    <script type="module">
        import { db, auth } from "../public/js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { collection, getDocs, doc, getDoc, updateDoc, addDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        let currentUser = null;
        let allUsers    = [];

        onAuthStateChanged(auth, async (user) => {
            currentUser = user;
            await loadUsers();
        });

        async function loadUsers() {
            const container = document.getElementById("userListContainer");
            try {
                const snapshot = await getDocs(collection(db, "users"));
                allUsers = [];
                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    if (currentUser && docSnap.id === currentUser.uid) return; // Kendini gösterme
                    if (data.banned) return; // Banlıları gösterme
                    allUsers.push({ uid: docSnap.id, ...data });
                });
                renderUsers(allUsers);
            } catch(err) {
                console.error(err);
                container.innerHTML = "<p style='text-align:center;padding:40px;color:#888;'>Failed to load users.</p>";
            }
        }

        async function renderUsers(users) {
            const container = document.getElementById("userListContainer");
            container.innerHTML = "";

            if (users.length === 0) {
                container.innerHTML = "<p style='text-align:center;padding:40px;color:#888;'>No users found.</p>";
                return;
            }

            // Mevcut takip listesini al
            let myFollowing = [];
            let myRequests  = [];
            if (currentUser) {
                const mySnap = await getDoc(doc(db, "users", currentUser.uid));
                if (mySnap.exists()) {
                    myFollowing = mySnap.data().following      || [];
                    myRequests  = mySnap.data().followRequests || [];
                }
            }

            users.forEach((u) => {
                const isFollowing = myFollowing.includes(u.uid);
                const isRequested = myRequests.includes(u.uid);
                const requiresApproval = u.followPrivacy === true;

                let btnText  = '<i class="fa-solid fa-user-plus"></i> Follow';
                let btnColor = "#000";
                let btnStatus = "follow";

                if (isFollowing) {
                    btnText  = '<i class="fa-solid fa-check"></i> Following';
                    btnColor = "#4f46e5";
                    btnStatus = "following";
                } else if (isRequested) {
                    btnText  = '<i class="fa-solid fa-clock"></i> Requested';
                    btnColor = "#f59e0b";
                    btnStatus = "requested";
                }

                const card = document.createElement("div");
                card.style.cssText = "display:flex;align-items:center;gap:14px;padding:16px 20px;background:#fff;border:1px solid #eee;border-radius:14px;margin-bottom:12px;transition:box-shadow 0.2s;";
                card.innerHTML = `
                    <img src="${u.photoUrl || '../public/img/user/user-1.jpg'}" alt=""
                        style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid #eee;cursor:pointer;"
                        onclick="window.location.href='user-profile.html?uid=${u.uid}'">
                    <div style="flex:1;cursor:pointer;" onclick="window.location.href='user-profile.html?uid=${u.uid}'">
                        <strong style="font-family:'Josefin Sans',sans-serif;font-size:0.95rem;display:block;">${u.displayName || "User"}</strong>
                        <small style="color:#888;font-family:'Josefin Sans',sans-serif;">${u.bio || "No bio"}</small>
                    </div>
                    ${currentUser ? `
                    <button data-uid="${u.uid}" data-status="${btnStatus}" data-privacy="${requiresApproval}"
                        style="padding:8px 16px;background:${btnColor};color:#fff;border:none;border-radius:10px;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-size:0.85rem;white-space:nowrap;flex-shrink:0;">
                        ${btnText}
                    </button>` : ""}
                `;

                // Follow butonu click
                const btn = card.querySelector("button[data-uid]");
                if (btn) {
                    btn.addEventListener("click", async () => {
                        const uid      = btn.dataset.uid;
                        const status   = btn.dataset.status;
                        const privacy  = btn.dataset.privacy === "true";
                        const myRef    = doc(db, "users", currentUser.uid);

                        if (status === "following") {
                            await updateDoc(myRef, { following: arrayRemove(uid) });
                            btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Follow';
                            btn.style.background = "#000";
                            btn.dataset.status = "follow";
                        } else if (status === "requested") {
                            await updateDoc(myRef, { followRequests: arrayRemove(uid) });
                            btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Follow';
                            btn.style.background = "#000";
                            btn.dataset.status = "follow";
                        } else {
                            if (privacy) {
                                // İstek gönder
                                await updateDoc(myRef, { followRequests: arrayUnion(uid) });
                                const myName = currentUser.displayName || currentUser.email.split("@")[0];
                                await addDoc(collection(db, "notifications"), {
                                    toUid: uid, fromUid: currentUser.uid,
                                    type: "follow_request",
                                    message: `${myName} wants to follow you.`,
                                    read: false, handled: false, createdAt: Date.now()
                                });
                                btn.innerHTML = '<i class="fa-solid fa-clock"></i> Requested';
                                btn.style.background = "#f59e0b";
                                btn.dataset.status = "requested";
                            } else {
                                // Direkt takip
                                await updateDoc(myRef, { following: arrayUnion(uid) });
                                const myName = currentUser.displayName || currentUser.email.split("@")[0];
                                await addDoc(collection(db, "notifications"), {
                                    toUid: uid, fromUid: currentUser.uid,
                                    type: "follow",
                                    message: `${myName} started following you.`,
                                    read: false, handled: false, createdAt: Date.now()
                                });
                                btn.innerHTML = '<i class="fa-solid fa-check"></i> Following';
                                btn.style.background = "#4f46e5";
                                btn.dataset.status = "following";
                            }
                        }
                    });
                }

                container.appendChild(card);
            });
        }

        // Arama filtresi
        document.getElementById("peopleSearch").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            if (!q) { renderUsers(allUsers); return; }
            const filtered = allUsers.filter(u =>
                (u.displayName || "").toLowerCase().includes(q) ||
                (u.bio || "").toLowerCase().includes(q)
            );
            renderUsers(filtered);
        });
    </script>
    <script src="../public/js/cookie-consent.js"></script>
    <script src="../public/js/terms-consent.js"></script>
</body>
</html>
