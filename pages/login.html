<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Login - BIBlog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
</head>
<body>
    <div class="topbar">
        <div class="wrapper target">
            <div class="left">
                <a href="https://x.com/Biblog_offical" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-x-twitter"></i></a>
                <a href="https://www.instagram.com/biblog_offical/" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-instagram"></i></a>
                <a href="https://www.youtube.com/channel/UC-GrT1yyu8FoyWQAyZSj_xQ" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-youtube"></i></a>
                <i class="fa-brands fa-square-pinterest"></i>
            </div>
            <div class="center">
                <a href="../index.html" data-i18n="home">HOME</a>
                <a href="./about.html" data-i18n="about">ABOUT</a>
                <a href="./register.html" data-i18n="register">REGISTER</a>
                <a href="./login.html" data-i18n="login">LOGIN</a>
            </div>
            <div class="right">
                <button class="dark-mode-btn" id="darkModeBtn" title="Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="searchEngine" id="searchEngine">
                    <input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="logReg">
        <img src="../public/img/background/login.png" alt="login">
        <form id="loginForm">
            <div class="formGroup">
                <input type="email" id="loginEmail" required>
                <span>Email *</span>
            </div>
            <div class="formGroup">
                <input type="password" id="loginPassword" required>
                <span>Password *</span>
            </div>

            <!-- Remember Me -->
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
                <input type="checkbox" id="rememberMe" style="width:16px; height:16px; cursor:pointer; accent-color:orange;">
                <label for="rememberMe" style="color:white; font-family:'Josefin Sans',sans-serif; font-size:0.88rem; cursor:pointer;">Remember Me</label>
            </div>

            <div class="btnGroup">
                <div style="display:flex; flex-direction:column; gap:8px;">
                    <a href="./register.html">Don't have an account?</a>
                    <a href="./forgot-password.html" style="font-size:0.85rem; color:#aaa;">Forgot Password</a>
                </div>
                <button type="submit">Login</button>
            </div>
        </form>
    </div>

    <script src="../public/js/dark-mode.js"></script>
    <script src="../public/js/search.js"></script>
    <script src="../public/js/scroll.js"></script>
    <script type="module" src="../public/js/firebase.js"></script>
    <script type="module" src="../public/js/login.js"></script>
    <script type="module" src="../public/js/auth-kontrol.js"></script>
    <script src="../public/js/language.js"></script>
    <script src="../public/js/cookie-consent.js"></script>
    <script src="../public/js/terms-consent.js"></script>
</body>
</html>
