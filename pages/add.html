<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <title>Add Post - BIBlog</title>
    <link rel="apple-touch-icon" sizes="180x180" href="../apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
</head>
<body>
    <div class="topbar">
        <div class="wrapper target">
            <div class="left">
                <button class="hamburger-btn" id="hamburgerBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <a href="https://x.com/Biblog_offical" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-x-twitter"></i></a>
                <a href="https://www.instagram.com/biblog_offical/" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-instagram"></i></a>
                <a href="https://www.youtube.com/channel/UC-GrT1yyu8FoyWQAyZSj_xQ" target="_blank" style="color:inherit;"><i class="fa-brands fa-square-youtube"></i></a>
            </div>
            <div class="center">
                <a href="../index.html" data-i18n="home">HOME</a>
                <a href="about.html" data-i18n="about">ABOUT</a>
                <a href="register.html" id="regBtn" data-i18n="register">REGISTER</a>
                <a href="login.html" id="loginBtn" data-i18n="login">LOGIN</a>
                <a href="add.html" id="addBtn" data-i18n="add" style="display:none;">ADD</a>
                <a href="./admin.html" id="adminLink" style="display:none; color:#f59e0b;"><i class="fa-solid fa-shield-halved"></i> Admin Panel</a>
                <a href="#" id="logoutBtn" onclick="logout()" style="display:none; color:#ff4d4d;" data-i18n="logout">LOGOUT</a>
            </div>
            <div class="right">
                <button class="dark-mode-btn" id="darkModeBtn" title="Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <div class="searchEngine" id="searchEngine">
                    <input type="text" id="searchInput" placeholder="Search...">
                    <i class="fa-solid fa-magnifying-glass" id="searchIcon"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Hamburger Menü -->
    <div class="side-menu" id="sideMenu">
        <div class="side-menu-header">
            <img id="menuProfileImg" src="../public/img/user/user-1.jpg" alt="profil">
            <div>
                <p id="menuUserName">Guest</p>
                <span id="menuUserEmail"></span>
            </div>
        </div>
        <nav>
            <a href="../index.html"><i class="fa-solid fa-house"></i> <span data-i18n="menuHome">Home</span></a>
            <a href="profile.html" id="menuProfileLink" style="display:none;"><i class="fa-solid fa-user"></i> <span data-i18n="menuProfile">My Profile</span></a>
            <a href="explore.html"><i class="fa-solid fa-compass"></i> <span data-i18n="menuExplore">Explore</span></a>
            <a href="notifications.html"><i class="fa-solid fa-bell"></i> <span data-i18n="menuNotif">Notifications</span></a>
            <a href="messages.html"><i class="fa-solid fa-comments"></i> <span data-i18n="menuMessages">Messages</span></a>
            <a href="public.html"><i class="fa-solid fa-globe"></i> <span data-i18n="menuPublic">Public Blogs</span></a>
            <a href="about.html"><i class="fa-solid fa-circle-info"></i> <span data-i18n="menuAbout">About</span></a>
            <a href="settings.html"><i class="fa-solid fa-gear"></i> <span data-i18n="menuSettings">Settings</span></a>
            <a href="#" id="menuLogoutBtn" onclick="logout()" style="display:none; color:#ff4d4d;"><i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="menuLogout">Log Out</span></a>
        </nav>
        <div class="side-menu-footer"><small data-i18n="copyright">BIBlog © 2025</small></div>
    </div>
    <div class="side-overlay" id="sideOverlay"></div>

    <div class="add">
        <form id="addPostForm">
            <div class="add-form-top">
                <input type="text" id="postTitle" data-i18n-placeholder="postTitle" placeholder="Title *" required>
                <textarea id="postContent" data-i18n-placeholder="postContent" placeholder="Content *" required></textarea>
                <input type="text" id="postAuthor" data-i18n-placeholder="postAuthor" placeholder="Your name *" required>
            </div>
            <div class="add-form-bottom">
                <!-- Media Upload Area -->
                <div class="media-upload-area" id="mediaUploadArea">
                    <div class="media-drop-zone" id="dropZone">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size:2rem;margin-bottom:10px;display:block;color:#888;"></i>
                        <p data-i18n="dragDrop" style="color:#888;margin:0;font-family:'Josefin Sans',sans-serif;">Drag and drop or click</p>
                        <small data-i18n="addMedia" style="color:#aaa;font-family:'Josefin Sans',sans-serif;font-size:0.8rem;">Add photos and videos (max 5)</small>
                    </div>
                    <input type="file" id="fileInput" style="display:none;" accept="image/*,video/*" multiple>
                    
                    <!-- Preview Container -->
                    <div class="media-preview-container" id="mediaPreviewContainer" style="display:none;"></div>
                </div>
                
                <button type="submit" id="submitBtn" data-i18n="publish">
                    <i class="fa-solid fa-paper-plane"></i> Publish
                </button>
            </div>
        </form>
    </div>

    <style>
    .media-upload-area {
        width: 100%;
        margin-bottom: 16px;
    }
    .media-drop-zone {
        border: 2px dashed #ddd;
        border-radius: 12px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #fafafa;
    }
    .media-drop-zone:hover, .media-drop-zone.dragover {
        border-color: #4f46e5;
        background: #f0f0ff;
    }
    .media-preview-container {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 12px;
    }
    .media-preview-item {
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid #eee;
    }
    .media-preview-item img, .media-preview-item video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .media-preview-item .remove-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        background: rgba(0,0,0,0.7);
        color: #fff;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        font-size: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .media-preview-item .media-type-badge {
        position: absolute;
        bottom: 4px;
        left: 4px;
        background: rgba(0,0,0,0.6);
        color: #fff;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 10px;
    }
    </style>

    <script src="../public/js/dark-mode.js"></script>
    <script src="../public/js/search.js"></script>
    <script src="../public/js/scroll.js"></script>
    <script src="../public/js/menu.js"></script>
    <script type="module" src="../public/js/firebase.js"></script>
    <script type="module" src="../public/js/add-post.js"></script>
    <script type="module" src="../public/js/auth-kontrol.js"></script>
    <script src="../public/js/language.js"></script>
    <script src="../public/js/cookie-consent.js"></script>
    <script src="../public/js/terms-consent.js"></script>
</body>
</html>
